spring.application.name=computadoras-backend

# Configuración de PostgreSQL
# Para Docker Compose: jdbc:postgresql://postgres:5432/computadorasdb
# Para ejecutar localmente (sin Docker): jdbc:postgresql://localhost:5432/computadorasdb
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/computadorasdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}
